version: '3'

vars:
  CONFIG_DIR: ./config
  SCRIPT_DIR: ./scripts

tasks:

  update:
    desc: Re-embed checksums and regenerate script for an existing binary.
    summary: |
      Re-embeds checksums (using the default_version in the config) and
      regenerates the install script for an existing binary.

      Invoke this task like:
        task update BINARY=opentofu
    cmds:
      - task: embed-checksums
        vars:
          BINARY: "{{.BINARY}}"
      - task: gen
        vars:
          BINARY: "{{.BINARY}}"
    requires:
      vars: ["BINARY"]

  new:
    desc: Add a new binary — init config, embed checksums, generate script.
    summary: |
      Initialize a binst config for a new GitHub project, embed checksums,
      and generate the install script.

      Invoke this task like:
        task new REPO=trufflesecurity/trufflehog
    vars:
      BINARY: "{{.REPO | base}}"
    cmds:
      - task: init
        vars:
          REPO: "{{.REPO}}"
      - task: embed-checksums
        vars:
          BINARY: "{{.BINARY}}"
      - task: gen
        vars:
          BINARY: "{{.BINARY}}"
    requires:
      vars: ["REPO"]

  init:
    desc: Initialize binst configuration for a GitHub project.
    summary: |
      Initialize a binst configuration for a GitHub project.
      Output is saved to {{.CONFIG_DIR}}/{{.BINARY}}.binstaller.yml.

      Invoke this task like:
        task init REPO=trufflesecurity/trufflehog
    vars:
      BINARY: "{{.REPO | base}}"
    cmd: |
      binst init --source=github --repo {{.REPO}} -o {{.CONFIG_DIR}}/{{.BINARY}}.binstaller.yml
    requires:
      vars: ["REPO"]

  embed-checksums:
    desc: Embed checksums into a binst configuration file.
    summary: |
      Embed checksums for a binary. VERSION is optional — if not provided,
      default_version from the config file is used. If neither is set, --version
      is omitted and binst uses its own default.

      Invoke this task like:
        task embed-checksums BINARY=trufflehog
        task embed-checksums BINARY=trufflehog VERSION=v3.92.4
    cmd: |
      VERSION={{.VERSION}}
      VERSION=${VERSION:-$(yq '.default_version // ""' {{.CONFIG_DIR}}/{{.BINARY}}.binstaller.yml)}
      # Conditionally include --version if VERSION is set. If VERSION is empty,
      # VERSION_FLAG will be an empty string and won't affect the command.
      VERSION_FLAG="${VERSION:+--version $VERSION}"
      binst embed-checksums --config {{.CONFIG_DIR}}/{{.BINARY}}.binstaller.yml $VERSION_FLAG --mode download
    requires:
      vars: ["BINARY"]

  gen:
    desc: Generate installation script from binst configuration.
    summary: |
      Generate an install script from a binst config file.
      Output is saved to {{.SCRIPT_DIR}}/{{.BINARY}}-install.sh.

      Invoke this task like:
        task gen BINARY=trufflehog
    cmd: |
      binst gen --config={{.CONFIG_DIR}}/{{.BINARY}}.binstaller.yml -o {{.SCRIPT_DIR}}/{{.BINARY}}-install.sh
    requires:
      vars: ["BINARY"]

  latest-release:
    desc: Show the latest release tag for a GitHub repo.
    summary: |
      Invoke this task like:
        task latest-release REPO=trufflesecurity/trufflehog
    cmd: |
      gh release view -R {{.REPO}} --json tagName --jq .tagName
    requires:
      vars: ["REPO"]

  install-*:
    desc: Install a binary using its generated script.
    summary: |
      Invoke this task like:
        task install-trufflehog
    cmd: |
      bash {{.SCRIPT_DIR}}/{{.BINARY}}-install.sh
    vars:
      BINARY: "{{index .MATCH 0}}"
