# yaml-language-server: $schema=https://raw.githubusercontent.com/binary-install/binstaller/main/schema/InstallSpec.json
schema: v1
repo: jdx/mise
default_version: v2026.7.5 # renovate: datasource=github-releases depName=jdx/mise
asset:
  template: mise-${TAG}-${OS}-${ARCH}-musl${EXT}
  default_extension: .tar.gz
  binaries:
    - name: mise
      path: mise/bin/mise
  rules:
    - when:
        arch: amd64
      arch: x64
    - when:
        os: darwin
      os: macos
    - when:
        os: darwin
      template: mise-${TAG}-${OS}-${ARCH}${EXT}
    - when:
        os: windows
      template: mise-${TAG}-${OS}-${ARCH}${EXT}
      ext: .zip
checksums:
  algorithm: sha256
  template: SHASUMS256.txt
  embedded_checksums:
    v2026.4.17: []
    v2026.4.18: []
    v2026.4.23: []
    v2026.5.0: []
    v2026.5.1: []
    v2026.5.11: []
    v2026.5.15: []
    v2026.5.5: []
    v2026.6.10: []
    v2026.6.11: []
    v2026.7.0: []
    v2026.7.5: []
