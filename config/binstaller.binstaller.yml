# yaml-language-server: $schema=https://raw.githubusercontent.com/binary-install/binstaller/main/schema/InstallSpec.json
schema: v1
repo: binary-install/binstaller
asset:
  template: binst_${OS}_${ARCH}${EXT}
  default_extension: .tar.gz
  rules:
  - when:
      arch: amd64
    arch: x86_64
  - when:
      os: darwin
    os: Darwin
  - when:
      os: linux
    os: Linux
  - when:
      os: windows
    os: Windows
  - when:
      os: windows
    ext: .zip
