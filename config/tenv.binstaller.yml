schema: v1
repo: tofuutils/tenv
asset:
  template: tenv_${TAG}_${OS}_${ARCH}${EXT}
  default_extension: .tar.gz
  binaries:
    - name: atmos
      path: atmos
    - name: tenv
      path: tenv
    - name: terraform
      path: terraform
    - name: terragrunt
      path: terragrunt
    - name: terramate
      path: terramate
    - name: tf
      path: tf
    - name: tofu
      path: tofu
  rules:
  - when:
      arch: amd64
    arch: x86_64
  - when:
      os: darwin
    os: Darwin
  - when:
      os: linux
    os: Linux
  - when:
      os: windows
    os: Windows
  - when:
      os: windows
    ext: .zip
