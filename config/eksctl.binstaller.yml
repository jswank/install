# yaml-language-server: $schema=https://raw.githubusercontent.com/binary-install/binstaller/main/schema/InstallSpec.json
schema: v1
repo: eksctl-io/eksctl
default_version: v0.221.0 # renovate: datasource=github-releases depName=eksctl-io/eksctl
asset:
  template: eksctl_${OS}_${ARCH}${EXT}
  default_extension: .tar.gz
  rules:
  - when:
      os: darwin
    os: Darwin
  - when:
      os: linux
    os: Linux
  - when:
      os: windows
    os: Windows
  - when:
      os: windows
    ext: .zip
