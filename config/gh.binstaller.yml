# yaml-language-server: $schema=https://raw.githubusercontent.com/binary-install/binstaller/main/schema/InstallSpec.json
schema: v1
repo: cli/cli
default_version: v2.96.0 # renovate: datasource=github-releases depName=cli/cli
asset:
  template: gh_${VERSION}_${OS}_${ARCH}${EXT}
  default_extension: .zip
  binaries:
    - name: gh
      path: gh_${VERSION}_${OS}_${ARCH}/bin/gh
  rules:
    - when:
        os: darwin
      os: macOS
    - when:
        os: linux
      ext: .tar.gz
