name: Regenerate install scripts on Renovate PRs

on:
  pull_request:
    branches: [main]
    paths:
      - "config/*.binstaller.yml"

jobs:
  regen:
    if: startsWith(github.head_ref, 'renovate/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Install task
        run: |
          curl -sSL https://raw.githubusercontent.com/jswank/install/main/scripts/task-install.sh | bash
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"

      - name: Install binst
        run: |
          curl -sSL https://raw.githubusercontent.com/jswank/install/main/scripts/binstaller-install.sh | bash
          echo "${HOME}/.local/bin" >> "$GITHUB_PATH"

      - name: Detect changed configs and regenerate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          changed=$(git diff --name-only origin/main...HEAD -- 'config/*.binstaller.yml' \
            | sed 's|config/||;s|\.binstaller\.yml||' \
            | tr '\n' ' ')
          echo "Changed binaries: ${changed}"

          for binary in ${changed}; do
            config="config/${binary}.binstaller.yml"
            repo=$(yq .repo "${config}")
            version=$(yq .default_version "${config}")
            renovate_comment=$(yq '.default_version | line_comment' "${config}")
            echo "Regenerating ${binary} (repo: ${repo}, version: ${version})"

            task embed-checksums BINARY="${binary}" VERSION="${version}"

            # restore renovate comment stripped by embed-checksums
            if [ -n "${renovate_comment}" ]; then
              yq -i ".default_version line_comment = \"${renovate_comment}\"" "${config}"
            fi

            task gen BINARY="${binary}"
          done

      - name: Commit regenerated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add config/ scripts/
          git diff --cached --quiet || git commit -m "chore: regenerate install scripts"
          git push
